global
    log /dev/log local0
    maxconn 2048
    daemon

defaults
    mode tcp
    timeout connect 5s
    timeout client  30s
    timeout server  30s

listen stats
    mode http
    bind *:8404
    stats enable
    stats uri /
    stats refresh 10s
    stats admin if TRUE

# Frontend на порту 80
frontend ft_tcp
    bind *:80
    default_backend bk_servers

# Бэкенды — два Python-сервера
backend bk_servers
    balance roundrobin
    server srv1 127.0.0.1:8001 check
    server srv2 127.0.0.1:8002 check

    